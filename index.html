<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conjectura de Collatz</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

background:#000;
color:white;

display:flex;
justify-content:center;
align-items:center;

padding:40px;

}

.container{

width:100%;
max-width:1200px;

background:#111;

border:2px solid white;

border-radius:20px;

padding:35px;

box-shadow:0 0 35px white;

}

h1{

text-align:center;

font-size:42px;

margin-bottom:15px;

letter-spacing:2px;

}

p{

text-align:center;

color:#ccc;

margin-bottom:25px;

}

.input-area{

display:flex;

gap:15px;

justify-content:center;

margin-bottom:25px;

flex-wrap:wrap;

}

input{

width:250px;

padding:15px;

font-size:20px;

border:none;

outline:none;

background:black;

color:white;

border:2px solid white;

border-radius:12px;

}

button{

padding:15px 35px;

font-size:18px;

background:white;

color:black;

border:none;

cursor:pointer;

border-radius:12px;

transition:.3s;

font-weight:bold;

}

button:hover{

background:#ddd;
transform:scale(1.05);

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

margin-top:25px;

}

.card{

background:black;

border:2px solid white;

padding:20px;

border-radius:15px;

}

.card h2{

margin-bottom:15px;

}

#steps{

height:450px;

overflow:auto;

white-space:pre-wrap;

font-size:18px;

}

.info{

font-size:20px;

line-height:40px;

}

canvas{

background:white;

border-radius:10px;

padding:10px;

}

footer{

margin-top:25px;

text-align:center;

color:#888;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>
<body>

<div class="container">

<h1>Conjectura de Collatz</h1>

<p>
Escolha um número inteiro positivo e veja toda a sequência até chegar em 1.
</p>

<div class="input-area">

<input
id="number"
type="number"
min="1"
placeholder="Digite um número">

<button onclick="collatz()">
Simular
</button>

</div>

<div class="grid">

<div class="card">

<h2>Resultados</h2>

<div class="info">

<div><b>Número inicial:</b> <span id="initial">-</span></div>

<div><b>Quantidade de passos:</b> <span id="count">-</span></div>

<div><b>Maior número:</b> <span id="max">-</span></div>

<div><b>Tempo:</b> <span id="time">-</span></div>

</div>

</div>

<div class="card">

<h2>Gráfico</h2>

<canvas id="chart"></canvas>

</div>

</div>

<div class="card" style="margin-top:20px">

<h2>Passos da Sequência</h2>

<div id="steps"></div>

</div>

<footer>

Conjectura de Collatz • Interface Interativa

</footer>

</div>

<script>

let chart;

function collatz(){

let n=parseInt(document.getElementById("number").value);

if(isNaN(n)||n<=0){

alert("Digite um número inteiro positivo.");

return;

}

let start=performance.now();

let seq=[n];

let texto="";

let passo=0;

let maior=n;

let atual=n;

texto+="Passo 0 → "+atual+"\n";

while(atual!=1){

if(atual%2==0){

atual=atual/2;

}else{

atual=3*atual+1;

}

passo++;

if(atual>maior)maior=atual;

seq.push(atual);

texto+="Passo "+passo+" → "+atual+"\n";

}

let end=performance.now();

document.getElementById("initial").innerHTML=n;

document.getElementById("count").innerHTML=passo;

document.getElementById("max").innerHTML=maior.toLocaleString();

document.getElementById("time").innerHTML=(end-start).toFixed(3)+" ms";

document.getElementById("steps").textContent=texto;

if(chart){

chart.destroy();

}

let ctx=document.getElementById("chart");

chart=new Chart(ctx,{

type:"line",

data:{

labels:seq.map((v,i)=>i),

datasets:[{

label:"Sequência",

data:seq,

borderColor:"black",

backgroundColor:"rgba(0,0,0,0.2)",

pointRadius:3,

borderWidth:3,

fill:false,

tension:0.2

}]

},

options:{

responsive:true,

plugins:{

legend:{

labels:{

color:"black"

}

}

},

scales:{

x:{

ticks:{color:"black"},

grid:{color:"#ccc"}

},

y:{

ticks:{color:"black"},

grid:{color:"#ccc"}

}

}

}

});

}

</script>

</body>
</html>
